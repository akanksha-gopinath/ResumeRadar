server:
  port: 8080

spring:
  application:
    name: resumeradar

  datasource:
    url: jdbc:h2:file:./data/resumeradar
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          linkedin:
            client-id: ${LINKEDIN_CLIENT_ID:your-client-id}
            client-secret: ${LINKEDIN_CLIENT_SECRET:your-client-secret}
            scope:
              - openid
              - profile
              - email
              - w_member_social
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/auth/linkedin/callback"
        provider:
          linkedin:
            authorization-uri: https://www.linkedin.com/oauth/v2/authorization
            token-uri: https://www.linkedin.com/oauth/v2/accessToken
            user-info-uri: https://api.linkedin.com/v2/userinfo
            user-name-attribute: sub

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

anthropic:
  api-key: ${ANTHROPIC_API_KEY:your-api-key}
  model: claude-sonnet-4-6-20250514

linkedin:
  api:
    base-url: https://api.linkedin.com/v2
